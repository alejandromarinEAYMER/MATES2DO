<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ranking Clase</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    text-align: center;
}

table {
    margin: auto;
    border-collapse: collapse;
    width: 60%;
    background: white;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

th {
    background: #3498db;
    color: white;
}

button {
    padding: 5px 10px;
    cursor: pointer;
    background: #2ecc71;
    border: none;
    color: white;
    border-radius: 5px;
}

.reset {
    background: #e74c3c;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>🏆 Ranking Clase</h1>

<table>
    <thead>
        <tr>
            <th>Posición</th>
            <th>Alumno</th>
            <th>Puntos</th>
            <th>+1</th>
        </tr>
    </thead>
    <tbody id="tabla"></tbody>
</table>

<button class="reset" onclick="resetear()">Resetear puntos</button>

<script>

let PASSWORD = "profe123"; // 🔐 cambia esto

let alumnos = [
    {nombre:"Alejandro Gago", puntos:0},
    {nombre:"Alex Lozano", puntos:0},
    {nombre:"Ariana Báez", puntos:0},
    {nombre:"Nora González", puntos:0},
    {nombre:"Illán Iglesias", puntos:0},
    {nombre:"Prestone Kabu", puntos:0},
    {nombre:"Daniela Marcos", puntos:0},
    {nombre:"Irene Marín", puntos:0},
    {nombre:"Amy Medina", puntos:0},
    {nombre:"Samir Osal", puntos:0},
    {nombre:"Alejandro Parrondo", puntos:0},
    {nombre:"Adrián Salinas", puntos:0},
    {nombre:"Adriana Severiche", puntos:0},
    {nombre:"Marina Villalba", puntos:0},
    {nombre:"Marcos Daniel", puntos:0}
];

// Cargar datos
if(localStorage.getItem("ranking")){
    alumnos = JSON.parse(localStorage.getItem("ranking"));
}

function mostrar(){
    alumnos.sort((a,b)=> b.puntos - a.puntos);

    let tabla = document.getElementById("tabla");
    tabla.innerHTML = "";

    alumnos.slice(0,8).forEach((alumno, index)=>{
        tabla.innerHTML += `
        <tr>
            <td>${index+1}</td>
            <td>${alumno.nombre}</td>
            <td>${alumno.puntos}</td>
            <td><button onclick="sumar(${index})">+1</button></td>
        </tr>
        `;
    });

    localStorage.setItem("ranking", JSON.stringify(alumnos));
}

function sumar(index){
    alumnos[index].puntos++;
    mostrar();
}

// 🔐 RESET CON CONTRASEÑA
function resetear(){
    let pass = prompt("Introduce la contraseña:");

    if(pass === PASSWORD){
        if(confirm("¿Seguro que quieres resetear los puntos?")){
            alumnos.forEach(a => a.puntos = 0);
            mostrar();
        }
    } else {
        alert("Contraseña incorrecta");
    }
}

mostrar();

</script>

</body>
</html>
